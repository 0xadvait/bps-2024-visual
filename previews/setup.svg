<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" ><style>.stroke{stroke:#2347d9;fill:none;stroke-width:1.2}.stroke-2{stroke:#2347d9;fill:none;stroke-width:1.8}.stroke-soft{stroke:#93a8f0;fill:none;stroke-width:1}.fill{fill:#2347d9}.fill-soft{fill:#eef2ff}.lead{stroke:#2347d9;fill:none;stroke-width:0.8}.dashed{stroke:#2347d9;fill:none;stroke-width:0.8;stroke-dasharray:3 3}.grid{stroke:#d8e0f5;fill:none;stroke-width:0.5}.lbl{font-family:'JetBrains Mono','SF Mono',Menlo,monospace;font-size:9.5px;fill:#2347d9;letter-spacing:0.06em;text-transform:uppercase}.lbl-soft{font-family:'JetBrains Mono','SF Mono',Menlo,monospace;font-size:9px;fill:#9ca3af;letter-spacing:0.06em;text-transform:uppercase}.lbl-big{font-family:'JetBrains Mono','SF Mono',Menlo,monospace;font-size:11px;fill:#2347d9;letter-spacing:0.06em;text-transform:uppercase;font-weight:600}.body{font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:11px;fill:#1f2937}</style><rect width="100%" height="100%" fill="#fffdf6"/>
          <defs>
            <marker id="cov-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" class="fill"/>
            </marker>
            <marker id="cov-arr-bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#c64545"/>
            </marker>
          </defs>

          <text x="28" y="30" class="lbl-big">THE BPS GAME — TWO ARBITRAGEURS, THREE MARKETS, ONE COOPERATIVE EQUILIBRIUM</text>
          <text x="28" y="46" class="lbl-soft">SOLID ARROWS = TACIT-COLLUSION ENTRY · DASHED RED = ENTRY THAT WOULD BREAK THE EQUILIBRIUM</text>
          <line x1="28" y1="58" x2="892" y2="58" class="stroke-soft"/>

          <!-- Intermediary 1 (left) -->
          <g transform="translate(80,140)">
            <rect x="0" y="0" width="160" height="80" class="stroke-2 fill-soft" rx="4"/>
            <text x="80" y="32" class="lbl-big" text-anchor="middle">INTERMEDIARY 1</text>
            <text x="80" y="50" class="lbl-soft" text-anchor="middle">natural market: M₁</text>
            <text x="80" y="64" class="lbl-soft" text-anchor="middle">cost in M₁: 0   ·   in M₂: f   ·   in M₃: f*</text>
          </g>

          <!-- Intermediary 2 (right) -->
          <g transform="translate(680,140)">
            <rect x="0" y="0" width="160" height="80" class="stroke-2 fill-soft" rx="4"/>
            <text x="80" y="32" class="lbl-big" text-anchor="middle">INTERMEDIARY 2</text>
            <text x="80" y="50" class="lbl-soft" text-anchor="middle">natural market: M₂</text>
            <text x="80" y="64" class="lbl-soft" text-anchor="middle">cost in M₁: f   ·   in M₂: 0   ·   in M₃: f*</text>
          </g>

          <!-- Three markets (bottom row) -->
          <g transform="translate(80,300)">
            <rect x="0" y="0" width="160" height="80" class="stroke-2" fill="#fffdf6" rx="4"/>
            <text x="80" y="26" class="lbl" text-anchor="middle">MARKET M₁</text>
            <text x="80" y="46" class="body" text-anchor="middle">value: A</text>
            <text x="80" y="62" class="lbl-soft" text-anchor="middle">"natural" to I₁</text>
          </g>

          <g transform="translate(380,300)">
            <rect x="0" y="0" width="160" height="80" class="stroke-2" fill="#fffdf6" rx="4"/>
            <text x="80" y="26" class="lbl" text-anchor="middle">MARKET M₃</text>
            <text x="80" y="46" class="body" text-anchor="middle">value: A*</text>
            <text x="80" y="62" class="lbl-soft" text-anchor="middle">natural to neither</text>
          </g>

          <g transform="translate(680,300)">
            <rect x="0" y="0" width="160" height="80" class="stroke-2" fill="#fffdf6" rx="4"/>
            <text x="80" y="26" class="lbl" text-anchor="middle">MARKET M₂</text>
            <text x="80" y="46" class="body" text-anchor="middle">value: A</text>
            <text x="80" y="62" class="lbl-soft" text-anchor="middle">"natural" to I₂</text>
          </g>

          <!-- arrows: solid = tacit collusion entry; dashed red = forbidden entry -->
          <!-- I1 → M1 (own natural market — enter) -->
          <line x1="160" y1="220" x2="160" y2="296" stroke="#2347d9" stroke-width="2.4" marker-end="url(#cov-arr)"/>
          <text x="170" y="266" class="lbl-soft" style="fill:#2347d9;">enter (cost 0)</text>

          <!-- I2 → M2 (own natural market — enter) -->
          <line x1="760" y1="220" x2="760" y2="296" stroke="#2347d9" stroke-width="2.4" marker-end="url(#cov-arr)"/>
          <text x="650" y="266" class="lbl-soft" style="fill:#2347d9;" text-anchor="end">enter (cost 0)</text>

          <!-- I1 ↘ M3 (alternate entry) -->
          <line x1="180" y1="222" x2="420" y2="296" stroke="#2347d9" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#cov-arr)"/>
          <text x="244" y="252" class="lbl-soft" style="fill:#2347d9;">alternate</text>
          <text x="244" y="266" class="lbl-soft" style="fill:#2347d9;">odd periods</text>

          <!-- I2 ↙ M3 (alternate entry) -->
          <line x1="740" y1="222" x2="500" y2="296" stroke="#2347d9" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#cov-arr)"/>
          <text x="676" y="252" class="lbl-soft" style="fill:#2347d9;" text-anchor="end">alternate</text>
          <text x="676" y="266" class="lbl-soft" style="fill:#2347d9;" text-anchor="end">even periods</text>

          <!-- FORBIDDEN: I1 → M2 -->
          <line x1="220" y1="220" x2="700" y2="296" stroke="#c64545" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#cov-arr-bad)"/>
          <text x="448" y="234" class="lbl-soft" style="fill:#c64545;" text-anchor="middle">break cooperation → trigger punishment</text>

          <!-- bottom strip -->
          <text x="460" y="430" class="lbl-soft" text-anchor="middle">SOLVE-ABLE AS A SUBGAME PERFECT EQUILIBRIUM IF δ ≥ (A − f − f*/2) / A</text>

          <text x="892" y="448" class="lbl-soft" text-anchor="end">FIG. 0 · TACIT COLLUSION ALLOCATION</text>
        </svg>